# Lefthook configuration
# https://github.com/evilmartians/lefthook

# Extends with Ultracite AI integration if available
# extends:
#   - https://raw.githubusercontent.com/ultracite/presets/main/lefthook/ai-integration.yml

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown {staged_files} && git add {staged_files}
    type-check:
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: npx --no-install commitlint --edit {1}
